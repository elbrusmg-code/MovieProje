<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link rel="stylesheet" href="css/bootstrap.min.css">
	<link rel="stylesheet" href="css/splide.min.css">
	<link rel="stylesheet" href="css/slimselect.css">
	<link rel="stylesheet" href="css/plyr.css">
	<link rel="stylesheet" href="css/photoswipe.css">
	<link rel="stylesheet" href="css/default-skin.css">
	<link rel="stylesheet" href="css/main.css">
	<link rel="icon" type="image/png" href="icon/favicon-32x32.png" sizes="32x32">
	<title>FlixGo – Show Details</title>
	<style>
		/* ── FIX: override FlixGo's dark overlay so content is visible ── */
		.details__bg {
			position: relative;
			padding: 60px 0 80px;
			background-color: #0d0d18;
			overflow: hidden;
		}
		/* blurred background image layer */
		.details__bg-img {
			position: absolute;
			inset: 0;
			background-size: cover;
			background-position: center top;
			filter: blur(18px) brightness(0.35);
			transform: scale(1.08);
			z-index: 0;
		}
		/* content sits above bg */
		.details__bg > .container {
			position: relative;
			z-index: 2;
		}

		/* ── Poster card ── */
		.details__poster {
			flex-shrink: 0;
			width: 220px;
		}
		.details__poster img {
			width: 100%;
			border-radius: 12px;
			display: block;
			box-shadow: 0 8px 40px rgba(0,0,0,0.6);
		}
		.details__layout {
			display: flex;
			gap: 44px;
			align-items: flex-start;
		}
		.details__info { flex: 1; min-width: 0; }

		/* ── Title ── */
		.details__title {
			font-size: 34px;
			font-weight: 800;
			color: #fff;
			margin: 0 0 16px;
			line-height: 1.15;
		}

		/* ── Badge row ── */
		.details__badges {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
			margin-bottom: 14px;
		}
		.badge-rate {
			background: #f5c518; color: #000;
			font-size: 12px; font-weight: 700;
			padding: 4px 11px; border-radius: 5px;
		}
		.badge-tag {
			background: rgba(255,255,255,0.09);
			border: 1px solid rgba(255,255,255,0.14);
			color: rgba(255,255,255,0.8);
			font-size: 12px; padding: 4px 11px; border-radius: 5px;
		}
		.badge-on  { background: rgba(46,213,115,0.15); border: 1px solid rgba(46,213,115,0.3); color: #2ed573; font-size:12px; padding:4px 11px; border-radius:5px; }
		.badge-off { background: rgba(255,71,87,0.12);  border: 1px solid rgba(255,71,87,0.25);  color: #ff4757; font-size:12px; padding:4px 11px; border-radius:5px; }

		/* ── Genre tags ── */
		.details__genres {
			display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px;
		}
		.details__genres a {
			color: rgba(255,255,255,0.55);
			font-size: 13px;
			border: 1px solid rgba(255,255,255,0.13);
			padding: 4px 14px; border-radius: 20px;
			text-decoration: none;
			transition: color .2s, border-color .2s;
		}
		.details__genres a:hover { color: #f5c518; border-color: #f5c518; }

		/* ── Summary ── */
		.details__summary {
			color: rgba(255,255,255,0.72);
			font-size: 14px; line-height: 1.8;
			margin-bottom: 22px; max-width: 640px;
		}

		/* ── Meta list ── */
		.details__meta {
			list-style: none; padding: 0; margin: 0 0 28px;
			display: flex; flex-direction: column; gap: 7px;
		}
		.details__meta li { font-size: 13px; color: rgba(255,255,255,0.5); }
		.details__meta li b { color: rgba(255,255,255,0.88); font-weight: 600; margin-right: 6px; min-width: 90px; display: inline-block; }
		.details__meta a { color: #f5c518; text-decoration: none; }
		.details__meta a:hover { text-decoration: underline; }

		/* ── Action buttons ── */
		.details__actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
		.btn-play {
			display: inline-flex; align-items: center; gap: 8px;
			height: 50px; padding: 0 30px;
			background: #f5c518; color: #000;
			border: none; border-radius: 8px;
			font-size: 14px; font-weight: 700;
			cursor: pointer; text-decoration: none;
			transition: background .2s, transform .15s;
			font-family: inherit;
		}
		.btn-play:hover { background: #ffd740; color: #000; transform: translateY(-1px); }
		.btn-play svg { width: 16px; height: 16px; }
		.btn-wl {
			display: inline-flex; align-items: center; gap: 8px;
			height: 50px; padding: 0 26px;
			background: transparent;
			border: 2px solid rgba(255,255,255,0.2);
			border-radius: 8px;
			color: #fff; font-size: 14px; font-weight: 600;
			cursor: pointer;
			transition: border-color .2s, color .2s, background .2s;
			font-family: inherit;
		}
		.btn-wl:hover { border-color: #f5c518; color: #f5c518; }
		.btn-wl.active { background: #f5c518; border-color: #f5c518; color: #000; }
		.btn-wl svg { width: 16px; height: 16px; }

		/* ── Sidebar ── */
		.details__sidebar { padding-left: 8px; }
		.sidebar-label {
			color: rgba(255,255,255,0.4);
			font-size: 11px; font-weight: 700;
			text-transform: uppercase; letter-spacing: 1.5px;
			margin: 0 0 14px;
		}

		/* Cast grid */
		.cast-grid {
			display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
			margin-bottom: 28px;
		}
		.cast-person { text-align: center; }
		.cast-person img {
			width: 54px; height: 54px; border-radius: 50%;
			object-fit: cover; display: block; margin: 0 auto 5px;
			background: rgba(255,255,255,.06);
			border: 2px solid rgba(255,255,255,.12);
		}
		.cast-person span {
			display: block; font-size: 10px;
			color: rgba(255,255,255,.45); line-height: 1.3;
			overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
		}

		/* Season accordion */
		.season-block { margin-bottom: 6px; }
		.season-toggle {
			width: 100%; background: rgba(255,255,255,.06);
			border: 1px solid rgba(255,255,255,.1);
			border-radius: 6px; padding: 9px 13px;
			display: flex; align-items: center; justify-content: space-between;
			color: rgba(255,255,255,.85); font-size: 13px; font-weight: 600;
			cursor: pointer; font-family: inherit; transition: background .2s;
			text-align: left;
		}
		.season-toggle:hover { background: rgba(255,255,255,.1); }
		.season-arrow { width: 14px; height: 14px; color: rgba(255,255,255,.4); transition: transform .2s; flex-shrink: 0; }
		.season-block.open .season-arrow { transform: rotate(90deg); }
		.season-eps { display: none; }
		.season-block.open .season-eps { display: block; }
		.season-eps-inner { max-height: 200px; overflow-y: auto; margin-top: 4px; }
		.ep-row {
			display: flex; align-items: center; gap: 10px;
			padding: 7px 10px;
			border-bottom: 1px solid rgba(255,255,255,.04);
			font-size: 12px;
		}
		.ep-num { color: #f5c518; font-weight: 700; min-width: 34px; }
		.ep-name { color: rgba(255,255,255,.7); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
		.ep-rt { color: rgba(255,255,255,.3); white-space: nowrap; }

		/* ── Watchlist panel ── */
		.wl-panel {
			display: none; position: fixed;
			top: 0; right: 0; bottom: 0; width: 310px;
			background: #13131f;
			border-left: 1px solid rgba(255,255,255,.08);
			z-index: 9999; flex-direction: column;
			box-shadow: -6px 0 32px rgba(0,0,0,.55);
		}
		.wl-panel.open { display: flex; }
		.wl-head {
			display: flex; align-items: center; justify-content: space-between;
			padding: 18px 18px 14px;
			border-bottom: 1px solid rgba(255,255,255,.08); flex-shrink: 0;
		}
		.wl-head-title { color: #f5c518; font-size: 15px; font-weight: 700; }
		.wl-close { background: none; border: none; color: rgba(255,255,255,.4); font-size: 20px; cursor: pointer; padding: 0 4px; }
		.wl-close:hover { color: #fff; }
		.wl-body { flex: 1; overflow-y: auto; padding: 14px; }
		.wl-empty { text-align: center; color: rgba(255,255,255,.3); font-size: 13px; padding: 36px 14px; line-height: 1.7; }
		.wl-card {
			display: flex; gap: 10px; padding: 10px;
			background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07);
			border-radius: 8px; margin-bottom: 10px;
			cursor: pointer; transition: border-color .2s; position: relative;
		}
		.wl-card:hover { border-color: rgba(245,197,24,.4); }
		.wl-card img { width: 44px; height: 66px; border-radius: 5px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,.06); }
		.wl-card-info { flex: 1; min-width: 0; }
		.wl-card-name { color: #fff; font-size: 13px; font-weight: 600; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
		.wl-card-meta { color: rgba(255,255,255,.38); font-size: 11px; }
		.wl-card-rm { position: absolute; top: 7px; right: 7px; background: none; border: none; color: rgba(255,255,255,.3); cursor: pointer; font-size: 13px; }
		.wl-card-rm:hover { color: #e74c3c; }

		/* ── Item bookmark on cards ── */
		.item--carousel { position: relative !important; }
		.item__cover { display: block; }
		.item__bookmark {
			position: absolute; top: 8px; right: 8px;
			width: 30px; height: 30px;
			background: rgba(0,0,0,.65); border: 1px solid rgba(255,255,255,.16);
			border-radius: 50%;
			display: flex; align-items: center; justify-content: center;
			cursor: pointer; z-index: 6;
			transition: background .2s, border-color .2s;
		}
		.item__bookmark svg { width: 13px; height: 13px; }
		.item__bookmark:not(.active) svg { fill: none; stroke: #fff; stroke-width: 2; }
		.item__bookmark.active { background: #f5c518; border-color: #f5c518; }
		.item__bookmark.active svg { fill: #000 !important; stroke: #000 !important; }

		/* ── Header watchlist btn ── */
		.header__wl-btn {
			display: flex; align-items: center; gap: 6px;
			background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
			border-radius: 6px; padding: 7px 14px;
			color: #fff; font-size: 13px; cursor: pointer;
			transition: border-color .2s, color .2s; font-family: inherit;
		}
		.header__wl-btn:hover { border-color: #f5c518; color: #f5c518; }
		.header__wl-btn svg { width: 15px; height: 15px; }
		.wl-count {
			background: #f5c518; color: #000; border-radius: 50%;
			width: 17px; height: 17px;
			display: inline-flex; align-items: center; justify-content: center;
			font-size: 10px; font-weight: 700;
		}

		/* ── Loading / Error ── */
		.page-loader {
			min-height: 500px; display: flex; flex-direction: column;
			align-items: center; justify-content: center;
			color: rgba(255,255,255,.4);
		}
		.spinner {
			width: 44px; height: 44px;
			border: 3px solid rgba(255,255,255,.1);
			border-top-color: #f5c518;
			border-radius: 50%;
			animation: spin .8s linear infinite;
			margin-bottom: 16px;
		}
		@keyframes spin { to { transform: rotate(360deg); } }

		/* ── Back link ── */
		.back-link {
			display: inline-flex; align-items: center; gap: 6px;
			color: rgba(255,255,255,.45); font-size: 13px;
			text-decoration: none; margin-bottom: 28px;
			transition: color .2s;
		}
		.back-link:hover { color: #f5c518; }
		.back-link svg { width: 16px; height: 16px; }

		/* ── Responsive ── */
		@media (max-width: 991px) {
			.details__layout { flex-direction: column; gap: 24px; }
			.details__poster { width: 160px; }
			.details__sidebar { padding-left: 0; margin-top: 32px; }
		}
		@media (max-width: 575px) {
			.details__title { font-size: 24px; }
			.details__poster { width: 130px; }
		}
	</style>
</head>
<body>

	<!-- header -->
	<header class="header">
		<div class="container">
			<div class="row">
				<div class="col-12">
					<div class="header__content">
						<a href="index.html" class="header__logo">
							<img src="img/logo.svg" alt="">
						</a>
						<div class="header__categories">
							<button class="header__categories-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
								<span></span><span></span>
							</button>
							<div class="dropdown-menu header__dropdown-menu header__dropdown-menu--categories">
								<ul class="header__categories-list">
									<li><a href="index.html">Films</a></li>
									<li><a href="index.html">TV Series</a></li>
									<li><a href="index.html">Anime</a></li>
								</ul>
							</div>
						</div>
						<ul class="header__nav">
							<li class="header__nav-item"><a class="header__nav-link" href="index.html">Home</a></li>
							<li class="header__nav-item"><a class="header__nav-link" href="index.html">Catalog</a></li>
						</ul>
						<div class="header__actions">
							<form class="header__search" onsubmit="doSearch(event)">
								<input type="text" id="hSearch" placeholder="Search shows...">
								<button type="submit">
									<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.71,20.29,18,16.61A9,9,0,1,0,16.61,18l3.68,3.68a1,1,0,0,0,1.42,0A1,1,0,0,0,21.71,20.29ZM11,18a7,7,0,1,1,7-7A7,7,0,0,1,11,18Z"/></svg>
								</button>
							</form>
							<button class="header__wl-btn" id="wlToggle">
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
								Watchlist <span class="wl-count" id="wlCount">0</span>
							</button>
							<a href="signin.html" class="header__sign-in">
								<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20,12a1,1,0,0,0-1-1H11.41l2.3-2.29a1,1,0,1,0-1.42-1.42l-4,4a1,1,0,0,0-.21.33,1,1,0,0,0,0,.76,1,1,0,0,0,.21.33l4,4a1,1,0,0,0,1.42,0,1,1,0,0,0,0-1.42L11.41,13H19A1,1,0,0,0,20,12ZM17,2H7A3,3,0,0,0,4,5V19a3,3,0,0,0,3,3H17a3,3,0,0,0,3-3V16a1,1,0,0,0-2,0v3a1,1,0,0,1-1,1H7a1,1,0,0,1-1-1V5A1,1,0,0,1,7,4H17a1,1,0,0,1,1,1V8a1,1,0,0,0,2,0V5A3,3,0,0,0,17,2Z"/></svg>
								<span>sign in</span>
							</a>
						</div>
						<button class="header__btn" type="button"><span></span><span></span><span></span></button>
					</div>
				</div>
			</div>
		</div>
	</header>

	<!-- Watchlist panel -->
	<div class="wl-panel" id="wlPanel">
		<div class="wl-head">
			<span class="wl-head-title">My Watchlist</span>
			<button class="wl-close" id="wlClose">✕</button>
		</div>
		<div class="wl-body" id="wlBody"></div>
	</div>

	<!-- mobile menu -->
	<div class="menu">
		<form class="menu__search" onsubmit="doSearch(event)">
			<input type="text" placeholder="Search">
			<button type="submit"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21.71,20.29,18,16.61A9,9,0,1,0,16.61,18l3.68,3.68a1,1,0,0,0,1.42,0A1,1,0,0,0,21.71,20.29ZM11,18a7,7,0,1,1,7-7A7,7,0,0,1,11,18Z"/></svg></button>
		</form>
		<ul class="menu__nav">
			<li class="menu__nav-item"><a class="menu__nav-link" href="index.html">Home</a></li>
			<li class="menu__nav-item"><a class="menu__nav-link" href="index.html">Catalog</a></li>
		</ul>
	</div>

	<!-- Details section – filled by JS -->
	<div id="root">
		<div class="page-loader"><div class="spinner"></div><p>Loading...</p></div>
	</div>

	<!-- Related carousel -->
	<section class="section section--dark" id="relSec" style="display:none">
		<div class="container">
			<div class="row">
				<div class="col-12">
					<h2 class="section__title section__title--carousel">You May Also Like</h2>
				</div>
				<div class="col-12">
					<div class="section__carousel splide splide--content" id="relCarousel">
						<div class="splide__arrows">
							<button class="splide__arrow splide__arrow--prev" type="button"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M17,11H9.41l3.3-3.29a1,1,0,1,0-1.42-1.42l-5,5a1,1,0,0,0-.21.33,1,1,0,0,0,0,.76,1,1,0,0,0,.21.33l5,5a1,1,0,0,0,1.42,0,1,1,0,0,0,0-1.42L9.41,13H17a1,1,0,0,0,0-2Z"/></svg></button>
							<button class="splide__arrow splide__arrow--next" type="button"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M17.92,11.62a1,1,0,0,0-.21-.33l-5-5a1,1,0,0,0-1.42,1.42L14.59,11H7a1,1,0,0,0,0,2h7.59l-3.3,3.29a1,1,0,0,0,0,1.42,1,1,0,0,0,1.42,0l5-5a1,1,0,0,0,.21-.33A1,1,0,0,0,17.92,11.62Z"/></svg></button>
						</div>
						<div class="splide__track">
							<ul class="splide__list" id="relList"></ul>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>

	<!-- footer -->
	<footer class="footer">
		<div class="container">
			<div class="row">
				<div class="col-12 col-xl-4">
					<div class="footer__logo"><img src="img/logo.svg" alt=""></div>
					<p class="footer__tagline">Movies & TV Shows, Online cinema.</p>
				</div>
				<div class="col-6 col-xl-2">
					<h6 class="footer__title">Browse</h6>
					<ul class="footer__list">
						<li><a href="index.html">Movies</a></li>
						<li><a href="index.html">TV Shows</a></li>
					</ul>
				</div>
			</div>
			<div class="row">
				<div class="col-12">
					<div class="footer__copyright">
						<small>© FlixGo, 2018—2023.</small>
						<ul><li><a href="#">Privacy policy</a></li></ul>
					</div>
				</div>
			</div>
		</div>
	</footer>

	<script src="js/bootstrap.bundle.min.js"></script>
	<script src="js/splide.min.js"></script>
	<!-- <script src="js/main.js"></script> -->
	<script src="js/details.js"></script>

</script>
